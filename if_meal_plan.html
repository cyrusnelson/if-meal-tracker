<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IF Meal Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F0E0C; color: #EDE8DC; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; }
  button { cursor: pointer; font-family: 'Courier New', monospace; }
  .mono { font-family: 'Courier New', monospace; }

  /* Header */
  .header { background: linear-gradient(180deg,#1A1812 0%,#0F0E0C 100%); padding: 32px 20px 0; border-bottom: 1px solid #2A2820; }
  .header-inner { max-width: 560px; margin: 0 auto; }
  .header-eyebrow { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #C4A55A; font-family: 'Courier New', monospace; margin-bottom: 8px; }
  .header-title { font-size: clamp(22px,5vw,36px); font-weight: 400; letter-spacing: -.02em; line-height: 1.1; margin-bottom: 20px; }
  .main-tabs { display: flex; }
  .main-tab { padding: 12px 20px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 13px; color: #5A5448; letter-spacing: .05em; transition: all .15s; }
  .main-tab.active { color: #EDE8DC; border-bottom-color: #C4A55A; }

  /* Day tabs */
  .day-tabs-wrap { background: #13120F; border-bottom: 1px solid #2A2820; padding: 0 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .day-tabs { max-width: 560px; margin: 0 auto; display: flex; min-width: min-content; }
  .day-tab { flex: 1; min-width: 54px; padding: 13px 6px; background: none; border: none; border-bottom: 2px solid transparent; text-align: center; transition: all .2s; }
  .day-tab-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-family: 'Courier New', monospace; color: #4A4840; margin-bottom: 3px; }
  .day-tab-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin: 0 auto; }

  /* Content */
  .content { max-width: 560px; margin: 0 auto; padding: 20px 20px 80px; }

  /* Calorie bar */
  .cal-bar { border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .cal-bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .cal-bar-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #5A5448; font-family: 'Courier New', monospace; }
  .cal-bar-total { font-size: 18px; font-weight: 500; font-family: 'Courier New', monospace; }
  .cal-bar-track { height: 4px; background: #2A2820; border-radius: 2px; margin-bottom: 8px; position: relative; }
  .cal-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
  .cal-bar-marker { position: absolute; top: -2px; width: 1px; height: 8px; background: #3A3830; }
  .cal-bar-split { display: flex; justify-content: space-between; font-size: 10px; color: #4A4840; font-family: 'Courier New', monospace; margin-bottom: 6px; }
  .cal-bar-dinner { font-size: 11px; color: #4A4840; font-family: 'Courier New', monospace; line-height: 1.5; }
  .snack-note { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 11px; color: #C4A55A; font-family: 'Courier New', monospace; line-height: 1.5; background: rgba(196,165,90,.08); border: 1px solid rgba(196,165,90,.2); }

  /* Meal card */
  .meal-card { border-radius: 10px; overflow: hidden; transition: all .2s; margin-bottom: 8px; border: 1px solid #2A2820; background: #171512; }
  .meal-card.open { background: #1E1C18; }
  .meal-card-header { padding: 14px 16px; cursor: pointer; }
  .meal-tags { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .tag { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-family: 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }
  .meal-name { font-size: 16px; font-weight: 400; color: #EDE8DC; margin-bottom: 4px; letter-spacing: -.01em; }
  .meal-desc { font-size: 11px; color: #5A5448; font-family: 'Courier New', monospace; line-height: 1.5; }
  .meal-toggle { font-size: 14px; transition: all .2s; flex-shrink: 0; margin-top: 2px; }
  .macros-row { display: flex; gap: 8px; margin-top: 10px; }
  .cal-pill { border-radius: 6px; padding: 6px 10px; text-align: center; min-width: 64px; }
  .cal-pill-num { font-size: 15px; font-weight: 600; }
  .cal-pill-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; font-family: 'Courier New', monospace; margin-top: 1px; }
  .macro-box { background: #0F0E0C; border: 1px solid #2A2820; border-radius: 6px; padding: 6px 10px; text-align: center; flex: 1; }
  .macro-val { font-size: 13px; font-weight: 500; color: #8A8070; }
  .macro-key { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: #4A4840; font-family: 'Courier New', monospace; margin-top: 1px; }

  /* Expanded */
  .meal-body { border-top: 1px solid #2A2820; }
  .budget-note-bar { padding: 8px 16px; background: #13120F; border-bottom: 1px solid #2A2820; font-size: 11px; font-family: 'Courier New', monospace; }
  .panel-tabs { display: flex; border-bottom: 1px solid #2A2820; }
  .panel-tab { flex: 1; padding: 9px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #4A4840; font-family: 'Courier New', monospace; transition: all .15s; }
  .panel-content { padding: 14px 16px 16px; }
  .why-text { font-size: 12px; color: #9A9080; line-height: 1.7; font-family: 'Courier New', monospace; }
  .recipe-step { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .step-num { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; font-size: 9px; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-top: 1px; }
  .step-text { font-size: 12px; color: #9A9080; line-height: 1.65; font-family: 'Courier New', monospace; }
  .tip-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .tip-arrow { font-size: 11px; margin-top: 2px; flex-shrink: 0; }
  .tip-text { font-size: 12px; color: #8A8070; line-height: 1.5; font-family: 'Courier New', monospace; }

  /* Fast window + nav */
  .fast-bar { padding: 11px 14px; background: #161410; border: 1px solid #2A2820; border-radius: 8px; font-size: 11px; color: #5A5448; font-family: 'Courier New', monospace; margin-top: 4px; }
  .day-nav { display: flex; gap: 10px; margin-top: 8px; }
  .nav-btn { flex: 1; padding: 11px; background: #161410; border: 1px solid #2A2820; border-radius: 8px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #6A6458; }
  .nav-btn.next { color: #C4A55A; text-align: right; }

  /* Section label */
  .section-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: #4A4840; font-family: 'Courier New', monospace; padding-left: 2px; margin-bottom: 6px; margin-top: 10px; }

  /* Day header */
  .day-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .day-name { font-size: 20px; font-weight: 400; letter-spacing: -.01em; }
  .day-num { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-family: 'Courier New', monospace; }

  /* Shopping */
  .shop-wrap { max-width: 560px; margin: 0 auto; padding: 20px 20px 80px; }
  .budget-line { font-size: 11px; color: #7DB87D; font-family: 'Courier New', monospace; margin-bottom: 10px; }
  .progress-row { display: flex; justify-content: space-between; font-size: 11px; color: #5A5448; font-family: 'Courier New', monospace; margin-bottom: 6px; }
  .progress-track { height: 3px; background: #2A2820; border-radius: 2px; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: #C4A55A; border-radius: 2px; transition: width .3s ease; }
  .shop-section { margin-bottom: 28px; }
  .shop-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; }
  .shop-section-title { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: .15em; text-transform: uppercase; font-family: 'Courier New', monospace; color: #C8C0B0; font-weight: 600; }
  .shop-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px; border-radius: 6px; cursor: pointer; transition: background .15s; }
  .shop-item.checked { }
  .checkbox { width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; border: 1.5px solid #3A3830; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .item-name { font-size: 14px; color: #EDE8DC; transition: all .15s; }
  .item-name.checked { text-decoration: line-through; color: #4A4840; }
  .item-qty { font-size: 11px; font-family: 'Courier New', monospace; font-weight: 600; flex-shrink: 0; }
  .item-qty.checked { text-decoration: line-through; color: #4A4840 !important; }
  .item-note { font-size: 10px; color: #5A5448; font-family: 'Courier New', monospace; margin-top: 2px; line-height: 1.4; }
  .shop-notes { border-top: 1px solid #2A2820; padding-top: 18px; font-size: 11px; color: #5A5448; font-family: 'Courier New', monospace; line-height: 1.8; }
  .shop-notes-title { color: #7A7060; font-weight: 600; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="app"></div>

  {day:"Tuesday",  breakfast:"Bone Broth + Soft Eggs",           lunch:"Chicken Thigh + Sweet Potato",   note:"Add a snack: 1 hard-boiled egg or handful of almonds (~150 kcal) to reach the 750–900 target"},

  {day:"Thursday", breakfast:"Avocado + Egg Toast",              lunch:"Chicken Soba Bowl",              note:null},
  {day:"Friday",   breakfast:"Oats with Peanut Butter + Banana", lunch:"Roasted Veggie + Farro Bowl",    note:null},
  {day:"Saturday", breakfast:"Veggie Scramble",                  lunch:"Chicken Thigh + Sweet Potato",   note:null},
  {day:"Sunday",   breakfast:"Oats with Peanut Butter + Banana", lunch:"Sirloin + Arugula Salad",        note:null}
];

const dayColors = ["#C4956A","#8BBFB8","#7B9E6B","#C9A0DC","#E8C4A0","#B8A060","#D4A574"];

const shopSections = [
  {name:"Produce",icon:"🥬",color:"#7DB87D",items:[
    {name:"Avocados",qty:"4 ripe",note:"Mon & Thu breakfasts, 1 per person"},
    {name:"Lemons",qty:"5",note:"Used across multiple meals for juice + zest"},
    {name:"Bananas",qty:"2 medium",note:"Fri + Sun breakfasts — use ½ each"},
    {name:"English cucumbers",qty:"2",note:"Thu soba bowl + Mon Greek salad"},
    {name:"Cherry tomatoes",qty:"2 pints (~24 oz)",note:"Mon, Wed, Fri lunches + arugula salad"},
    {name:"Red onion",qty:"2 medium",note:"Multiple lunches — salads and farro bowl"},
    {name:"Scallions / green onions",qty:"1 bunch",note:"Wed rice bowl + Thu soba bowl"},
    {name:"Zucchini",qty:"2 medium",note:"Fri farro bowl + Sat scramble"},
    {name:"Broccolini or broccoli",qty:"2 bunches",note:"Tue + Sat sheet pan chicken"},
    {name:"Sweet potatoes",qty:"4 medium (~2 lbs)",note:"Tue ×2 + Sat ×2 servings"},
    {name:"Spinach or baby bok choy",qty:"1 large bag (5 oz)",note:"Sat scramble + general use"},
    {name:"Romaine lettuce",qty:"1 head",note:"Mon Grilled Chicken Greek Salad"},
    {name:"Arugula",qty:"1 bag (5 oz)",note:"Sun Sirloin + Arugula Salad"},
    {name:"Fresh ginger root",qty:"1 small knob (2 in)",note:"Thu soba dressing"},
    {name:"Garlic",qty:"1 head",note:"Multiple lunches — 8–10 cloves total"},
  ]},
  {name:"Protein",icon:"🥩",color:"#C4705A",items:[
    {name:"Eggs",qty:"3 dozen (36 eggs)",note:"Used in nearly every breakfast + several lunches — buy in bulk"},
    {name:"Bone-in skin-on chicken thighs",qty:"8 thighs (~3 lbs)",note:"Tue + Sat lunches, 2 thighs per person per meal"},
    {name:"Boneless skinless chicken thighs",qty:"4 thighs (~1.5 lbs)",note:"Mon Greek salad + Thu soba bowl, 1 thigh per person each"},
    {name:"Sirloin steak",qty:"~1 lb",note:"Sun lunch — 5–6 oz per person, ~$10/lb"},
    {name:"Full-fat Greek yogurt",qty:"34 oz (~1 large tub)",note:"Wed breakfast, ¾ cup (170g) per person"},
  ]},
  {name:"Dairy & Refrigerated",icon:"🧀",color:"#C4A55A",items:[
    {name:"Feta cheese (block, not crumbled)",qty:"6 oz",note:"Fri farro bowl + Mon Greek salad"},
    {name:"Parmesan (wedge)",qty:"2 oz",note:"Sun sirloin salad — shaved with a peeler"},
    {name:"Unsalted butter",qty:"1 stick (4 oz)",note:"Mon + Thu egg toast + various cooking"},
  ]},
  {name:"Pantry & Dry Goods",icon:"🫙",color:"#A89060",items:[
    {name:"Rolled oats (not instant)",qty:"1 lb bag",note:"Fri + Sun breakfasts, ½ cup per person"},
    {name:"Brown rice",qty:"2 lbs bag",note:"Wed lunch batch cook"},
    {name:"Farro",qty:"1 lb bag",note:"Fri lunch — batch cook ½ cup dry per person"},
    {name:"Soba noodles (100% buckwheat)",qty:"8 oz package",note:"Thu lunch — 3 oz dry per person; check label"},
    {name:"Sourdough bread (thick-sliced)",qty:"1 loaf",note:"Mon + Thu breakfast, 1 thick slice per person"},
    {name:"Natural peanut butter",qty:"1 jar (16 oz)",note:"Fri + Sun breakfast — 1 tbsp per person; rest keeps"},
  ]},
  {name:"Canned & Jarred",icon:"🥫",color:"#8B7355",items:[
    {name:"Bone broth (carton or cans)",qty:"1 quart (32 oz)",note:"Tue breakfast — 1½ cups (350ml) per person"},
    {name:"Kalamata olives (pitted)",qty:"1 jar (6 oz)",note:"Mon Grilled Chicken Greek Salad — ~10 olives per person"},
  ]},
  {name:"Oils, Sauces & Condiments",icon:"🫒",color:"#7A9060",items:[
    {name:"Extra virgin olive oil",qty:"1 bottle (16 oz)",note:"Used in nearly every meal"},
    {name:"Soy sauce (low sodium preferred)",qty:"1 bottle",note:"Wed rice bowl + Thu soba dressing"},
    {name:"Sesame oil (toasted)",qty:"1 small bottle",note:"Wed + Thu — a little goes far"},
    {name:"Rice vinegar",qty:"1 small bottle",note:"Thu soba dressing"},
    {name:"Raw honey",qty:"1 jar (small)",note:"Wed yogurt parfait + soba dressing"},
  ]},
  {name:"Frozen",icon:"🧊",color:"#6B9BAE",items:[
    {name:"Frozen mixed berries",qty:"1 lb bag (16 oz)",note:"Wed breakfast — ½ cup per person; rest keeps"},
  ]},
  {name:"Spices & Dry Seasonings",icon:"🧂",color:"#9A7A60",items:[
    {name:"Kosher salt",qty:"On hand",note:""},
    {name:"Black pepper",qty:"On hand",note:""},
    {name:"Smoked paprika",qty:"1 small jar",note:"Tue + Sat chicken thighs"},
    {name:"Dried oregano",qty:"1 small jar",note:"Fri farro bowl + Mon Greek salad"},
    {name:"Ground cinnamon",qty:"1 small jar",note:"Fri + Sun oat breakfast"},
    {name:"Red pepper flakes",qty:"1 small jar",note:"Mon + Thu egg toast + general use"},
    {name:"Sesame seeds",qty:"1 small bag",note:"Optional garnish — Thu soba"},
  ]},
];

// ── STATE ──────────────────────────────────────────────────────────────────
let view = 'schedule';
let activeDay = 0;
let openMeal = {};   // {dayIdx_slot: true}
let mealPanel = {};  // {dayIdx_slot: 'why'|'recipe'|'tips'}
let shopChecked = {};

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
    ${buildHeader()}
    ${view === 'schedule' ? buildSchedule() : buildShopping()}
  `;
}

function buildHeader() {
  return `
  <div class="header">
    <div class="header-inner">
      <div class="header-eyebrow">Intermittent Fasting · 11:30 AM Window · 2 People</div>
      <h1 class="header-title">${view === 'schedule' ? 'Weekly Meal Schedule' : 'Shopping List'}</h1>
      <div class="main-tabs">
        <button class="main-tab ${view==='schedule'?'active':''}" onclick="setView('schedule')">📅  Schedule</button>
        <button class="main-tab ${view==='shopping'?'active':''}" onclick="setView('shopping')">🛒  Shopping List</button>
      </div>
    </div>
  </div>`;
}

function buildSchedule() {
  const day = schedule[activeDay];
  const bMeal = allMeals[day.breakfast];
  const lMeal = allMeals[day.lunch];
  const bCals = bMeal?.calories || 0;
  const lCals = lMeal?.calories || 0;
  const total = bCals + lCals;
  const target = 900;
  const pct = Math.min((total / target) * 100, 100);
  const inBand = total >= 750 && total <= 950;
  const statusColor = inBand ? '#7DB87D' : total < 750 ? '#C4A55A' : '#B05252';

  const dayTabsHtml = schedule.map((d,i) => `
    <button class="day-tab" onclick="setDay(${i})" style="border-bottom-color:${activeDay===i?dayColors[i]:'transparent'}">
      <div class="day-tab-label" style="color:${activeDay===i?dayColors[i]:'#4A4840'}">${d.day.slice(0,3)}</div>
      <div class="day-tab-dot" style="background:${activeDay===i?dayColors[i]:'transparent'}"></div>
    </button>`).join('');

  const snackHtml = day.note ? `<div class="snack-note">⚡ ${day.note}</div>` : '';

  const navHtml = `
    <div class="day-nav">
      ${activeDay > 0 ? `<button class="nav-btn" onclick="setDay(${activeDay-1})">← ${schedule[activeDay-1].day}</button>` : '<div></div>'}
      ${activeDay < 6 ? `<button class="nav-btn next" onclick="setDay(${activeDay+1})">${schedule[activeDay+1].day} →</button>` : ''}
    </div>`;

  return `
    <div class="day-tabs-wrap"><div class="day-tabs">${dayTabsHtml}</div></div>
    <div class="content">
      <div class="day-header">
        <span class="day-name">${day.day}</span>
        <span class="day-num" style="color:${dayColors[activeDay]}">Day ${activeDay+1} of 7</span>
      </div>

      <div class="cal-bar" style="background:#161410;border:1px solid ${statusColor}30">
        <div class="cal-bar-header">
          <span class="cal-bar-label">These 2 meals · target 750–900</span>
          <span class="cal-bar-total" style="color:${statusColor}">${total} <span style="font-size:11px;color:#5A5448">kcal</span></span>
        </div>
        <div class="cal-bar-track">
          <div class="cal-bar-marker" style="left:${(750/900)*100}%"></div>
          <div class="cal-bar-fill" style="width:${pct}%;background:${statusColor}"></div>
        </div>
        <div class="cal-bar-split">
          <span>Breakfast: ${bCals} kcal</span>
          <span>Lunch: ${lCals} kcal</span>
        </div>
        <div class="cal-bar-dinner">Dinner budget: <span style="color:${statusColor}">${Math.max(0,2200-total)}–${Math.max(0,2400-total)} kcal</span> <span style="color:#3A3830">· deficit target 2,200–2,400/day · TDEE ~2,800</span></div>
        ${snackHtml}
      </div>

      <div class="section-label">11:30 AM — Break Fast</div>
      ${buildMealCard(day.breakfast, 'Breakfast', activeDay+'_b')}
      <div class="section-label">2:00–3:00 PM — Mid Window</div>
      ${buildMealCard(day.lunch, 'Lunch', activeDay+'_l')}

      <div class="fast-bar"><span style="color:#C4A55A">Fast window:</span> 9:30 PM tonight → 11:30 AM tomorrow · 14 hours</div>
      ${navHtml}
    </div>`;
}

function buildMealCard(mealName, slot, key) {
  const meal = allMeals[mealName];
  if (!meal) return '';
  const isOpen = !!openMeal[key];
  const panel = mealPanel[key] || 'why';

  const macrosHtml = Object.entries(meal.macros).map(([k,v]) => `
    <div class="macro-box">
      <div class="macro-val">${v}</div>
      <div class="macro-key">${k}</div>
    </div>`).join('');

  let bodyHtml = '';
  if (isOpen) {
    let panelContent = '';
    if (panel === 'why') {
      panelContent = `<p class="why-text">${meal.why}</p>`;
    } else if (panel === 'recipe') {
      panelContent = meal.recipe.map((step,j) => `
        <div class="recipe-step">
          <div class="step-num" style="background:${meal.color}20;border:1px solid ${meal.color}55;color:${meal.color}">${j+1}</div>
          <span class="step-text">${step}</span>
        </div>`).join('');
    } else {
      panelContent = meal.tips.map(tip => `
        <div class="tip-row">
          <span class="tip-arrow" style="color:${meal.color}">→</span>
          <span class="tip-text">${tip}</span>
        </div>`).join('');
    }

    bodyHtml = `
      <div class="meal-body">
        <div class="budget-note-bar" style="color:${budgetColors[meal.budget]}BB">${meal.budgetNote}</div>
        <div class="panel-tabs">
          ${[['why','Why It Works'],['recipe','Recipe'],['tips','Pro Tips']].map(([k,l]) => `
            <button class="panel-tab" onclick="setPanel('${key}','${k}')"
              style="border-bottom-color:${panel===k?meal.color:'transparent'};color:${panel===k?meal.color:'#4A4840'}">${l}</button>`).join('')}
        </div>
        <div class="panel-content">${panelContent}</div>
      </div>`;
  }

  return `
    <div class="meal-card ${isOpen?'open':''}" style="border-color:${isOpen?meal.color+'55':'#2A2820'}">
      <div class="meal-card-header" onclick="toggleMeal('${key}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
          <div style="flex:1">
            <div class="meal-tags">
              <span class="tag" style="background:#2A2820;color:#6A6458">${slot}</span>
              <span class="tag" style="background:${meal.color}18;color:${meal.color}">${meal.tag}</span>
              <span class="tag" style="background:${budgetColors[meal.budget]}18;color:${budgetColors[meal.budget]};font-weight:700">${meal.budget}</span>
            </div>
            <div class="meal-name">${mealName}</div>
            <div class="meal-desc">${meal.desc}</div>
          </div>
          <div class="meal-toggle" style="color:${isOpen?meal.color:'#3A3830'};transform:${isOpen?'rotate(45deg)':'none'}">✕</div>
        </div>
        <div class="macros-row">
          <div class="cal-pill" style="background:${meal.color}20;border:1px solid ${meal.color}50">
            <div class="cal-pill-num" style="color:${meal.color}">${meal.calories}</div>
            <div class="cal-pill-label" style="color:${meal.color}99">kcal</div>
          </div>
          ${macrosHtml}
        </div>
      </div>
      ${bodyHtml}
    </div>`;
}

function buildShopping() {
  const totalItems = shopSections.reduce((a,s) => a + s.items.length, 0);
  const checkedCount = Object.values(shopChecked).filter(Boolean).length;
  const pct = (checkedCount / totalItems) * 100;

  const sectionsHtml = shopSections.map((section, si) => {
    const sectionChecked = section.items.filter((_,ii) => shopChecked[`${si}-${ii}`]).length;
    const itemsHtml = section.items.map((item, ii) => {
      const key = `${si}-${ii}`;
      const isChecked = !!shopChecked[key];
      return `
        <div class="shop-item" onclick="toggleShop('${key}')" style="background:${isChecked?section.color+'10':'transparent'}">
          <div class="checkbox" style="border-color:${isChecked?section.color:'#3A3830'};background:${isChecked?section.color:'transparent'}">
            ${isChecked ? '<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
          </div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
              <span class="item-name ${isChecked?'checked':''}">${item.name}</span>
              <span class="item-qty ${isChecked?'checked':''}" style="color:${isChecked?'#4A4840':section.color}">${item.qty}</span>
            </div>
            ${item.note ? `<div class="item-note" style="color:${isChecked?'#3A3830':'#5A5448'}">${item.note}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="shop-section">
        <div class="shop-section-header" style="border-bottom:2px solid ${section.color}25">
          <div class="shop-section-title"><span>${section.icon}</span><span>${section.name}</span></div>
          <span style="font-size:11px;font-family:'Courier New',monospace;color:${sectionChecked===section.items.length?section.color:'#5A5448'}">${sectionChecked}/${section.items.length}</span>
        </div>
        <div>${itemsHtml}</div>
      </div>`;
  }).join('');

  return `
    <div class="shop-wrap">
      <div class="budget-line">~$95–115 for two people · ~$7–8/person/day for 2 meals</div>
      <div class="progress-row">
        <span>${checkedCount} of ${totalItems} items</span>
        <span>${Math.round(pct)}% done</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${sectionsHtml}
      <div class="shop-notes">
        <div class="shop-notes-title">Notes</div>
        <p>· Eggs (3 dozen) are the single biggest line item but cover nearly every meal.</p>
        <p>· Check your spice cabinet — most jars listed may already be on hand.</p>
        <p>· Batch cook brown rice + farro on Sunday to cover Wed + Fri lunches.</p>
        <p>· Buy all 8 bone-in thighs at once — cook Tue batch Tuesday, Sat batch Saturday.</p>
      </div>
    </div>`;
}

// ── EVENT HANDLERS ─────────────────────────────────────────────────────────
function attachEvents() {}

function setView(v) { view = v; render(); window.scrollTo(0,0); }
function setDay(i) { activeDay = i; openMeal = {}; mealPanel = {}; render(); window.scrollTo(0,0); }
function toggleMeal(key) { openMeal[key] = !openMeal[key]; if (!mealPanel[key]) mealPanel[key] = 'why'; render(); }
function setPanel(key, p) { mealPanel[key] = p; render(); }
function toggleShop(key) { shopChecked[key] = !shopChecked[key]; render(); }

render();
</script>
</body>
</html>
